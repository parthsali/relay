name: Release (manual)

on:
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  setup:
    name: Resolve next minor version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      minor:   ${{ steps.ver.outputs.minor }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version
        id: ver
        run: |
          git fetch --tags

          # Collect the highest minor seen across all three tag series.
          # This prevents collisions with patch tags (api/v*, agent/v*)
          # that were already pushed by the auto-tag workflows.
          max_minor() {
            git tag -l "$1" | sed "s|$2||" | sort -V | tail -1 | cut -d. -f2
          }

          M1=$(max_minor "v[0-9]*"     "v")
          M2=$(max_minor "api/v*"      "api/v")
          M3=$(max_minor "agent/v*"    "agent/v")

          # Pick the highest minor found, default 0 if no tags yet
          HIGH_MIN=0
          for m in "$M1" "$M2" "$M3"; do
            [ -n "$m" ] && [ "$m" -gt "$HIGH_MIN" ] && HIGH_MIN="$m"
          done

          VERSION="0.$((HIGH_MIN + 1)).0"
          echo "version=${VERSION}"                      >> "$GITHUB_OUTPUT"
          echo "minor=$(echo $VERSION | cut -d. -f1-2)" >> "$GITHUB_OUTPUT"
          echo "Resolved: minor=${HIGH_MIN} -> ${VERSION}"

  build-api:
    name: Build API image
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/api/Dockerfile
          push: true
          provenance: false
          tags: |
            ghcr.io/${{ github.repository_owner }}/relay-api:${{ needs.setup.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/relay-api:${{ needs.setup.outputs.minor }}
            ghcr.io/${{ github.repository_owner }}/relay-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-agent:
    name: Build Agent binaries
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/agent/go.mod
          cache-dependency-path: apps/agent/go.sum

      - name: Cross-compile
        working-directory: apps/agent
        env:
          CGO_ENABLED: "0"
        run: |
          VERSION="${{ needs.setup.outputs.version }}"
          LDFLAGS="-s -w -X main.Version=${VERSION}"
          mkdir -p dist
          for TARGET in linux/arm64 linux/arm linux/amd64; do
            OS="${TARGET%%/*}" ARCH="${TARGET##*/}"
            GOOS="$OS" GOARCH="$ARCH" go build \
              -trimpath -ldflags "$LDFLAGS" \
              -o "dist/relay-agent_${OS}_${ARCH}" ./cmd/api
          done

      - name: Checksums
        working-directory: apps/agent/dist
        run: sha256sum relay-agent_* > sha256sums.txt

      - uses: actions/upload-artifact@v4
        with:
          name: agent-binaries
          path: apps/agent/dist/

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: [setup, build-api, build-agent]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push git tags
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch --tags
          git tag "v${{ needs.setup.outputs.version }}"
          git tag "api/v${{ needs.setup.outputs.version }}"
          git tag "agent/v${{ needs.setup.outputs.version }}"
          git push origin \
            "v${{ needs.setup.outputs.version }}" \
            "api/v${{ needs.setup.outputs.version }}" \
            "agent/v${{ needs.setup.outputs.version }}"

      - uses: actions/download-artifact@v4
        with:
          name: agent-binaries
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.setup.outputs.version }}
          name: "Relay v${{ needs.setup.outputs.version }}"
          prerelease: false
          generate_release_notes: true
          body: |
            ### API - `api/v${{ needs.setup.outputs.version }}`
            ```bash
            docker pull ghcr.io/${{ github.repository_owner }}/relay-api:${{ needs.setup.outputs.version }}
            # pin to minor (updated on future patches):
            docker pull ghcr.io/${{ github.repository_owner }}/relay-api:${{ needs.setup.outputs.minor }}
            ```

            ### Agent - `agent/v${{ needs.setup.outputs.version }}`
            ```bash
            VERSION="${{ needs.setup.outputs.version }}"
            curl -fsSL "https://github.com/${{ github.repository }}/releases/download/v${VERSION}/relay-agent_linux_arm64" \
              -o /usr/local/bin/relay-agent && chmod +x /usr/local/bin/relay-agent
            ```

            | Binary | Target |
            |--------|--------|
            | `relay-agent_linux_arm64` | Pi Zero 2 W, Pi 4/5 (64-bit) |
            | `relay-agent_linux_arm`   | Pi Zero W (32-bit ARMv6/7)   |
            | `relay-agent_linux_amd64` | x86-64 dev / CI               |

            > **OTA:** Dashboard -> Updates -> version `${{ needs.setup.outputs.version }}` + binary URL + SHA-256 from `sha256sums.txt` -> Push Update.
          files: |
            dist/relay-agent_linux_arm64
            dist/relay-agent_linux_arm
            dist/relay-agent_linux_amd64
            dist/sha256sums.txt

      - name: Summary
        run: |
          echo "### Released v${{ needs.setup.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Release | \`v${{ needs.setup.outputs.version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| API tag | \`api/v${{ needs.setup.outputs.version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Agent tag | \`agent/v${{ needs.setup.outputs.version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Docker | \`ghcr.io/${{ github.repository_owner }}/relay-api:${{ needs.setup.outputs.version }}\` |" >> "$GITHUB_STEP_SUMMARY"
