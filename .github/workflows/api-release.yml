name: API Release

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "docker/api/**"
  workflow_dispatch:

permissions:
  contents: write        
  packages: write       

jobs:
  release:
    name: Build & Push API Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository (full history for tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve next version
        id: version
        run: |
          # Fetch all remote tags
          git fetch --tags

          # Find the latest tag matching api/v* (semantic sort)
          LATEST=$(git tag -l "api/v*" | sort -V | tail -1)

          if [ -z "$LATEST" ]; then
            # No tag exists yet — start at 0.1.0
            NEXT="0.1.0"
          else
            # Strip the "api/v" prefix → e.g. "0.1.2"
            VERSION="${LATEST#api/v}"
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            PATCH=$(echo "$VERSION" | cut -d. -f3)
            NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi

          echo "next=${NEXT}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${NEXT}"

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/api/Dockerfile
          push: true
          provenance: false
          tags: |
            ghcr.io/${{ github.repository_owner }}/relay-api:${{ steps.version.outputs.next }}
            ghcr.io/${{ github.repository_owner }}/relay-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push version tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "api/v${{ steps.version.outputs.next }}"
          git push origin "api/v${{ steps.version.outputs.next }}"

      - name: Print summary
        run: |
          echo "### API Release" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | \`${{ steps.version.outputs.next }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | \`ghcr.io/${{ github.repository_owner }}/relay-api:${{ steps.version.outputs.next }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tag | \`api/v${{ steps.version.outputs.next }}\` |" >> "$GITHUB_STEP_SUMMARY"
